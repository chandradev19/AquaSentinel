version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aquashield_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aquashield_db}
      POSTGRES_USER: ${POSTGRES_USER:-aquashield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aquashield_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aquashield_backend
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-aquashield_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-aquashield}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - db
    networks:
      - aquashield_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aquashield_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - aquashield_net

networks:
  aquashield_net:
    driver: bridge

volumes:
  postgres_data:
